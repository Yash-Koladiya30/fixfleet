name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # triggers on v0.3.2, v1.0.0, etc.
  workflow_dispatch:  # allow manual trigger

jobs:
  build-and-publish:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/fixfleet/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PROJ_VERSION=$(grep -E '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          if [ "$TAG_VERSION" != "$PROJ_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match pyproject.toml version $PROJ_VERSION"
            exit 1
          fi
          echo "Version matches: $PROJ_VERSION"

      - name: Run tests
        run: python -m unittest tests.test_all

      - name: Build distribution
        run: python -m build

      - name: Verify distribution
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password/token — uses Trusted Publishing via OIDC.
