name: Publish VSCode Extension

on:
  push:
    tags:
      - 'ext-v*'  # triggers on ext-v0.1.3, ext-v0.2.0, etc.
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build + publish to VSCode Marketplace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/ext-v}"
          PROJ_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PROJ_VERSION" ]; then
            echo "::error::Tag ext-v$TAG_VERSION does not match vscode/package.json version $PROJ_VERSION"
            exit 1
          fi
          echo "Version matches: $PROJ_VERSION"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension
        run: npx vsce package

      - name: Publish to VSCode Marketplace
        run: npx vsce publish --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload .vsix as release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: vscode/fixfleet-*.vsix
          tag_name: ${{ github.ref_name }}
