<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- rocket body (capsule) -->
  <path d="M12 1.5c2.6 2.3 4 5.5 4 9v6.5H8V10.5c0-3.5 1.4-6.7 4-9z"
        stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>

  <!-- FF monogram inside body -->
  <path d="M10 9.5v5M10 9.5h1.6M10 11.8h1.3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M13 9.5v5M13 9.5h1.6M13 11.8h1.3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- left fin -->
  <path d="M8 14l-3 4.5V20l3-1.5V14z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
  <!-- right fin -->
  <path d="M16 14l3 4.5V20l-3-1.5V14z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="none"/>

  <!-- flame -->
  <path d="M10.5 17.5c.4 1.4 1 2.5 1.5 4 .5-1.5 1.1-2.6 1.5-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
